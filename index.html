<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fidget Spinner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #faf7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    transition: background 0.4s;
  }

  /* ── Background glow blob ── */
  .bg-glow {
    position: fixed;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(205,90,60,0.18) 0%, transparent 70%);
    pointer-events: none;
    animation: glowPulse 4.2s ease-in-out infinite;
    transition: background 0.4s;
  }

  @keyframes glowPulse {
    0%   { transform: scale(0.92); opacity: 0.3;  }
    35%  { transform: scale(1.22); opacity: 1;    }
    100% { transform: scale(0.92); opacity: 0.3;  }
  }

  /* ── Star wrapper ── */
  .logo-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    z-index: 1;
  }

  .claude-star {
    width: 140px;
    height: 140px;
    will-change: transform;
    transition: opacity 0.6s, filter 0.4s;
  }

  /* Idle fade pulse on the star itself */
  .claude-star.idle-pulse {
    animation: starFade 4.2s ease-in-out infinite;
  }

  @keyframes starFade {
    0%   { opacity: 0.45; filter: drop-shadow(0 0 4px  var(--glow-color, rgba(205,90,60,0.15))); }
    35%  { opacity: 1;    filter: drop-shadow(0 0 28px var(--glow-color, rgba(205,90,60,0.8)));  }
    100% { opacity: 0.45; filter: drop-shadow(0 0 4px  var(--glow-color, rgba(205,90,60,0.15))); }
  }

  /* ── Ripple ── */
  .ripple {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2.5px solid rgba(205,90,60,0.5);
    pointer-events: none;
    display: none;
  }

  @keyframes rippleOut {
    from { transform: scale(1);   opacity: 1; }
    to   { transform: scale(2.2); opacity: 0; }
  }

  /* ── Custom cursor dot ── */
  .cursor-dot {
    width: 8px;
    height: 8px;
    background: #cd5c3c;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* ══════════════════════════════
     MENU
  ══════════════════════════════ */
  .menu-btn {
    position: fixed;
    top: 20px; right: 22px;
    z-index: 100;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 6px;
  }

  .menu-btn span {
    display: block;
    width: 24px;
    height: 2.5px;
    background: #888;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .menu-btn:hover span { background: #cd5c3c; }

  /* Dropdown panel — right sidebar, never covers spinner */
  .menu-panel {
    position: fixed;
    top: 0; right: -320px;
    width: 300px;
    height: 100vh;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 1px solid rgba(255,255,255,0.3);
    box-shadow: -4px 0 24px rgba(0,0,0,0.08);
    padding: 70px 22px 30px;
    z-index: 100;
    overflow-y: auto;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .menu-panel.open {
    right: 0;
  }

  .menu-panel h3 {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 12px;
    font-family: Georgia, serif;
  }

  .color-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .color-row:last-child { margin-bottom: 0; }

  .swatch {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }

  .swatch:hover       { transform: scale(1.18); }
  .swatch.active      { border-color: #333; }

  .shape-row {
    display: flex;
    gap: 9px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .shape-btn {
    width: 46px;
    height: 46px;
    border: 2px solid rgba(200,180,160,0.5);
    border-radius: 8px;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, transform 0.15s;
    padding: 4px;
  }

  .shape-btn:hover      { transform: scale(1.12); border-color: #cd5c3c; }
  .shape-btn.active     { border-color: #333; background: rgba(255,255,255,0.45); }

  .divider {
    height: 1px;
    background: rgba(200,180,160,0.35);
    margin: 16px 0;
  }

  .zoom-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .zoom-label {
    font-size: 16px;
    color: #999;
    font-weight: bold;
    user-select: none;
    cursor: default;
  }

  #zoomSlider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #e8e0d8;
    outline: none;
    cursor: pointer;
  }

  #zoomSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #cd5c3c;
    cursor: pointer;
    transition: background 0.2s;
  }

  #zoomSlider::-webkit-slider-thumb:hover { background: #b04a2c; }

</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- ── Menu button (three bars) ── -->
<button class="menu-btn" id="menuBtn" title="Settings">
  <span></span><span></span><span></span>
</button>

<!-- ── Dropdown panel ── -->
<div class="menu-panel" id="menuPanel">
  <h3>Spinner Color</h3>
  <div class="color-row" id="starColors"></div>
  <div class="divider"></div>
  <h3>Background Color</h3>
  <div class="color-row" id="bgColors"></div>
  <div class="divider"></div>
  <h3>Spoke Shape</h3>
  <div class="shape-row" id="shapeOptions"></div>
  <div class="divider"></div>
  <h3>Size</h3>
  <div class="zoom-row">
    <span class="zoom-label">−</span>
    <input type="range" id="zoomSlider" min="40" max="200" value="100" step="5"/>
    <span class="zoom-label">+</span>
  </div>
</div>

<div class="logo-wrap" id="wrap">
  <div class="ripple" id="ripple"></div>

  <svg class="claude-star idle-pulse" id="star" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(50,50)" id="spokes">
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(0)"/>
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(45)"/>
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(90)"/>
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(135)"/>
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(180)"/>
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(225)"/>
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(270)"/>
      <rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="#cd5c3c" transform="rotate(315)"/>
    </g>
  </svg>
</div>

<script>
  const star      = document.getElementById('star');
  const wrap      = document.getElementById('wrap');
  const ripple    = document.getElementById('ripple');
  const cursorDot = document.getElementById('cursorDot');
  const bgGlow    = document.getElementById('bgGlow');

  // ── Color options ──────────────────────────────────────────
  const STAR_COLORS = [
    { label: 'Black',       value: '#111111' },
    { label: 'White',       value: '#ffffff' },
    { label: 'Crimson',     value: '#e03535' },
    { label: 'Cobalt',      value: '#2563eb' },
    { label: 'Emerald',     value: '#16a34a' },
    { label: 'Violet',      value: '#7c3aed' },
    { label: 'Yellow',      value: '#facc15' },
    { label: 'Rose',        value: '#e11d78' },
    { label: 'Brown',       value: '#7c3e1e' },
    { label: 'Terracotta',  value: '#cd5c3c' },
    { label: 'Teal',        value: '#0d9488' },
    { label: 'Coral',       value: '#f97316' },
    { label: 'Indigo',      value: '#4338ca' },
    { label: 'Mint',        value: '#34d399' },
    { label: 'Burgundy',    value: '#881337' },
    { label: 'Gold',        value: '#b45309' },
  ];

  const BG_COLORS = [
    { label: 'Cream',       value: '#faf7f2' },
    { label: 'White',       value: '#ffffff' },
    { label: 'Charcoal',    value: '#1e1e1e' },
    { label: 'Black',       value: '#000000' },
    { label: 'Navy',        value: '#0f172a' },
    { label: 'Sage',        value: '#e8f0e9' },
    { label: 'Blush',       value: '#fdf0f0' },
    { label: 'Sky',         value: '#e0f2fe' },
    { label: 'Brown',       value: '#4a2e1a' },
    { label: 'Warm Stone',  value: '#d6cfc7' },
    { label: 'Linen',       value: '#f5f0e8' },
    { label: 'Taupe',       value: '#b5a899' },
    { label: 'Mocha',       value: '#3b2314' },
    { label: 'Sand',        value: '#e8dcc8' },
    { label: 'Mushroom',    value: '#9e8e80' },
    { label: 'Slate',       value: '#334155' },
  ];

  let currentStarColor = '#cd5c3c';
  let currentBgColor   = '#faf7f2';

  // ── Shape definitions (must be before applyStarColor) ──────
  const SHAPES = [
    {
      id: 'spike',
      label: 'Spike (default)',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 8; i++)
          g += `<rect x="-5" y="-44" width="10" height="30" rx="5" ry="5" fill="${color}" transform="rotate(${i*45})"/>`;
        return g;
      }
    },
    {
      id: 'petal',
      label: 'Flower Petal',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 8; i++)
          g += `<path d="M0,-44 C10,-30 10,-18 0,-10 C-10,-18 -10,-30 0,-44 Z" fill="${color}" transform="rotate(${i*45})"/>`;
        return g;
      }
    },
    {
      id: 'oval',
      label: 'Oval',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 8; i++)
          g += `<ellipse cx="0" cy="-30" rx="6" ry="16" fill="${color}" transform="rotate(${i*45})"/>`;
        return g;
      }
    },
    {
      id: 'egg',
      label: 'Egg',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 8; i++)
          g += `<path d="M0,-44 C14,-36 14,-20 0,-12 C-14,-20 -14,-36 0,-44 Z" fill="${color}" transform="rotate(${i*45}) scale(0.85,1)"/>`;
        return g;
      }
    },
    {
      id: 'teardrop',
      label: 'Teardrop',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 8; i++)
          g += `<path d="M0,-46 C8,-34 10,-22 0,-10 C-10,-22 -8,-34 0,-46 Z" fill="${color}" transform="rotate(${i*45})"/>`;
        return g;
      }
    },
    {
      id: 'boat',
      label: 'Boat / Oblong',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 8; i++)
          g += `<path d="M0,-44 C12,-34 12,-22 0,-12 C-12,-22 -12,-34 0,-44 Z" fill="${color}" transform="rotate(${i*45}) scaleX(0.7)"/>`;
        return g;
      }
    },
    {
      id: 'swirl',
      label: 'Swirl Fan',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 10; i++)
          // Scaled up to match ~y=-44 reach, swept blade shape
          g += `<path d="M0,0 C8,-10 18,-14 16,-30 C13,-44 3,-46 0,-34 C5,-26 3,-12 0,0 Z" fill="${color}" transform="rotate(${i*36})"/>`;
        return g;
      }
    },
    {
      id: 'scythe',
      label: 'Scythe Swirl',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 10; i++)
          // blade redrawn starting from y=-10 (gap from center), not y=0
          g += `<path d="M0,-10 C8,-10 16,-16 15,-28 C13,-40 5,-44 0,-40 C6,-36 9,-26 4,-18 C2,-14 0,-12 0,-10 Z" fill="${color}" transform="rotate(${i*36})"/>`;
        return g;
      }
    },
    {
      id: 'laurel',
      label: 'Laurel Wreath',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 12; i++)
          // Leaves pushed out to ~y=-44 radius, larger body
          g += `<path d="M0,-44 C7,-36 7,-24 0,-18 C-7,-24 -7,-36 0,-44 Z" fill="${color}" transform="rotate(${i*30}) rotate(18, 0, -31)"/>`;
        return g;
      }
    },
    {
      id: 'clover',
      label: 'Four Leaf Clover',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 4; i++)
          g += `<ellipse cx="0" cy="-30" rx="14" ry="16" fill="${color}" transform="rotate(${i*90})"/>`;
        return g;
      }
    },
    {
      id: 'heartflower',
      label: 'Heart Flower',
      make: (color) => {
        let g = '';
        for (let i = 0; i < 6; i++)
          g += `<path d="M0,0 C-2,-5 -12,-5 -12,-15 C-12,-24 0,-25 0,-17 C0,-25 12,-24 12,-15 C12,-5 2,-5 0,0 Z"
            fill="${color}" transform="rotate(${i*60}) translate(0,-18) scale(1.3)"/>`;
        return g;
      }
    },
    {
      id: 'daisy',
      label: 'Daisy',
      make: (color) => {
        let g = '';
        // 8 fat rounded petals, each a full ellipse floated off center — like a daisy
        for (let i = 0; i < 8; i++)
          g += `<ellipse cx="0" cy="-28" rx="10" ry="16" fill="${color}" transform="rotate(${i*45})"/>`;
        // small center dot
        g += `<circle cx="0" cy="0" r="7" fill="${color}"/>`;
        return g;
      }
    },
  ];

  let currentShape = SHAPES[0];

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function applyStarColor(color) {
    currentStarColor = color;
    const spokesGroup = document.getElementById('spokes');
    spokesGroup.innerHTML = currentShape.make(color);
    document.documentElement.style.setProperty('--glow-color', hexToRgba(color, 0.6));
    bgGlow.style.background = `radial-gradient(circle, ${hexToRgba(color, 0.18)} 0%, transparent 70%)`;
    ripple.style.borderColor = hexToRgba(color, 0.5);
    cursorDot.style.background = color;
    document.querySelectorAll('#starColors .swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.color === color);
    });
  }

  function applyBgColor(color) {
    currentBgColor = color;
    document.body.style.background = color;
    document.querySelectorAll('#bgColors .swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.color === color);
    });
  }

  function buildSwatches(containerId, colors, applyFn, activeColor) {
    const container = document.getElementById(containerId);
    colors.forEach(c => {
      const div = document.createElement('div');
      div.className = 'swatch' + (c.value === activeColor ? ' active' : '');
      div.style.background = c.value;
      div.dataset.color = c.value;
      div.title = c.label;
      div.addEventListener('click', () => { applyFn(c.value); });
      container.appendChild(div);
    });
  }

  buildSwatches('starColors', STAR_COLORS, (c) => applyStarColor(c), currentStarColor);
  buildSwatches('bgColors',   BG_COLORS,   applyBgColor,   currentBgColor);

  // ── Build shape buttons ──
  function applySpokeShape(shape) {
    currentShape = shape;
    const spokesGroup = document.getElementById('spokes');
    spokesGroup.innerHTML = shape.make(currentStarColor);
    document.querySelectorAll('.shape-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.shape === shape.id)
    );
  }

  // Build shape preview buttons
  const shapeContainer = document.getElementById('shapeOptions');
  SHAPES.forEach(shape => {
    const btn = document.createElement('button');
    btn.className = 'shape-btn' + (shape.id === currentShape.id ? ' active' : '');
    btn.dataset.shape = shape.id;
    btn.title = shape.label;

    // Mini SVG preview of the shape (3 spokes for preview clarity)
    btn.innerHTML = `<svg viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">
      <g>${shape.make('#111111')}</g>
    </svg>`;

    btn.addEventListener('click', () => applySpokeShape(shape));
    shapeContainer.appendChild(btn);
  });

  // ── Menu toggle ────────────────────────────────────────────
  const menuBtn   = document.getElementById('menuBtn');
  const menuPanel = document.getElementById('menuPanel');

  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    menuPanel.classList.toggle('open');
  });

  document.addEventListener('click', (e) => {
    if (!menuPanel.contains(e.target) && e.target !== menuBtn)
      menuPanel.classList.remove('open');
  });
  menuPanel.addEventListener('click', e => e.stopPropagation());

  // ── Zoom slider ────────────────────────────────────────────
  const zoomSlider = document.getElementById('zoomSlider');
  zoomSlider.addEventListener('input', () => {
    const scale = zoomSlider.value / 100;
    star.style.width  = `${140 * scale}px`;
    star.style.height = `${140 * scale}px`;
    // also update slider thumb color to match current star color
    zoomSlider.style.setProperty('--thumb-color', currentStarColor);
  });

  // ── Spinner physics ────────────────────────────────────────
  let angle    = 0;
  let velocity = 0;
  let prevCursorAngle = null;
  let idleTimer = null;
  let isIdle    = true;

  const FRICTION         = 0.96;
  const MAX_SPEED        = 20;
  const INFLUENCE_RADIUS = 350;

  function getStarCenter() {
    const rect = star.getBoundingClientRect();
    return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  }

  function markActive() {
    if (isIdle) {
      isIdle = false;
      star.classList.remove('idle-pulse');
      star.style.opacity = '';
      star.style.filter  = '';
    }
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      isIdle = true;
      star.classList.add('idle-pulse');
    }, 1800);
  }

  document.addEventListener('mousemove', (e) => {
    cursorDot.style.opacity = '1';
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top  = e.clientY + 'px';

    const center = getStarCenter();
    const dx = e.clientX - center.x;
    const dy = e.clientY - center.y;
    const distance = Math.sqrt(dx*dx + dy*dy);

    const cursorAngle = Math.atan2(dy, dx) * (180 / Math.PI);

    if (prevCursorAngle === null) { prevCursorAngle = cursorAngle; return; }

    let angleDelta = cursorAngle - prevCursorAngle;
    if (angleDelta >  180) angleDelta -= 360;
    if (angleDelta < -180) angleDelta += 360;

    const proximity   = Math.max(0, 1 - distance / INFLUENCE_RADIUS);
    const sensitivity = 1.5 * (proximity * proximity + 0.1);

    velocity += angleDelta * sensitivity;
    velocity  = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, velocity));

    prevCursorAngle = cursorAngle;
    markActive();
  });

  document.addEventListener('mouseleave', () => {
    cursorDot.style.opacity = '0';
    prevCursorAngle = null;
  });

  function animate() {
    if (isIdle) {
      velocity *= 0.88;
      if (Math.abs(velocity) < 0.01) velocity = 0;
      angle += velocity;
      star.style.transform = `rotate(${angle}deg)`;
    } else {
      velocity *= FRICTION;
      if (Math.abs(velocity) < 0.01) velocity = 0;
      angle += velocity;
      star.style.transform = `rotate(${angle}deg)`;
    }

    requestAnimationFrame(animate);
  }

  animate();

  wrap.addEventListener('click', () => {
    ripple.style.display = 'block';
    ripple.style.animation = 'none';
    void ripple.offsetWidth;
    ripple.style.animation = 'rippleOut 0.7s ease-out forwards';
    setTimeout(() => ripple.style.display = 'none', 700);
  });
</script>

</body>
</html>
